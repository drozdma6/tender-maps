name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'procurements_api/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: tendermapsacr.azurecr.io
  IMAGE_REPO: procurements-api
  CONTAINERAPP_NAME: tender-maps-be
  CONTAINERAPP_RG: Homework2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${ACR_LOGIN_SERVER%%.*}"

      - name: Build and push image
        working-directory: procurements_api
        run: |
          IMAGE="${ACR_LOGIN_SERVER}/${IMAGE_REPO}:${GITHUB_SHA}"
          LATEST="${ACR_LOGIN_SERVER}/${IMAGE_REPO}:latest"
          docker build -t "$IMAGE" -t "$LATEST" .
          docker push "$IMAGE"
          docker push "$LATEST"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Update Container App
        run: |
          az containerapp update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$CONTAINERAPP_RG" \
            --image "$IMAGE"