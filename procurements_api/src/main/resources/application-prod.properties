server.port=8081
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
springdoc.swagger-ui.path=/api-docs

# Passwordless connection to Azure Database for PostgreSQL via managed identity.
# The Azure JDBC plugin obtains an Entra access token from the Container App's
# managed identity and presents it as the Postgres password. No secret is stored.
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}?sslmode=require&authenticationPluginClassName=com.azure.identity.extensions.jdbc.postgresql.AzurePostgresqlAuthenticationPlugin
spring.datasource.username=${POSTGRES_USER}